# ============================================================
# SERVER
# ============================================================
server.port=8080
server.address=0.0.0.0
server.servlet.context-path=/api
server.ssl.enabled=false

# ============================================================
# MONGODB ATLAS
# ============================================================
spring.data.mongodb.uri=${MONGO_URL}
spring.data.mongodb.database=${DATABASE_NAME}
spring.data.mongodb.auto-index-creation=true

# ============================================================
# JWT
# ============================================================
jwt_secret_key=${JWT_SECRET}
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000
#hello
# ============================================================
# GOOGLE OAUTH2
# ============================================================
google.client.id=${OATH2_ID}

# ============================================================
# GROQ AI  (replaces Gemini ? free, hosted, no local setup needed)
# 1. Sign up at console.groq.com (free, no credit card)
# 2. Go to API Keys ? Create API Key
# 3. Set environment variable: GROQ_API_KEY=your_key_here
# Free tier: 14,400 requests/day ? plenty for a resume builder!
# ============================================================
groq.api.key=${API_KEY}
groq.api.url=${API_URL}
groq.model=${MODEL}

# Other free Groq models you can swap in:
#   groq.model=gemma2-9b-it          (Google's Gemma, faster)
#   groq.model=llama-3.1-8b-instant  (smaller, ultra fast)
#   groq.model=mixtral-8x7b-32768    (great for long resumes)

# ============================================================
# RAZORPAY
# ============================================================
razorpay.key.id=rzp_test_XXXXXXXXXX
razorpay.key.secret=YOUR_RAZORPAY_SECRET

# ============================================================
# RESUME LIMITS
# ============================================================
app.resume.free.daily.limit=2
app.resume.price.rupees=9
app.resume.ads.required=1

# ============================================================
# FILE UPLOAD
# ============================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================================
# ADMIN
# ============================================================
app.admin.email=${ADMIN_MAIL}
app.admin.password=${ADMIN_PASSWORD}

# ============================================================
# MAIL
# ============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SMTP_MAIL}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ============================================================
# LOGGING
# ============================================================
logging.level.com.resumebuilder=INFO
logging.level.org.springframework.security=WARN